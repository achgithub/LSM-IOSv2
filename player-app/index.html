<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta name="theme-color" content="#131B2E" />
    <title>Last Stand Manager &#x2014; Submit</title>
    <script>
      (() => {
        const match = location.pathname.match(/\/s\/([0-9a-f-]{36})(?:\/|$)/i);
        const href = match ? `/s/${match[1].toLowerCase()}/manifest.webmanifest` : "/manifest.webmanifest";
        document.write(`<link rel="manifest" href="${href}" />`);
      })();
    </script>
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  </head>

  </body>
</html>
