<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0B1220" />
    <title>Last Stand Manager &#x2014; Submit</title>
    <script>
      (() => {
        const match = location.pathname.match(/\/s\/([0-9a-f-]{36})(?:\/|$)/i);
        const href = match ? `/s/${match[1].toLowerCase()}/manifest.webmanifest` : "/manifest.webmanifest";
        document.write(`<link rel="manifest" href="${href}" />`);
      })();
    </script>
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main id="app">
      <section class="hero-panel compact-hero">
        <div class="top-line">
          <div id="hero-greeting">
            <h1>Loading…</h1>
          </div>
          <div class="header-actions">
            <button id="refresh-action" class="refresh-action" type="button" aria-label="Refresh">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path fill="currentColor" d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
              </svg>
            </button>
            <button id="save-link-action" class="save-link-action" type="button" hidden>Save link</button>
            <button id="text-size-toggle" class="text-toggle" type="button" aria-pressed="false">Text +</button>
          </div>
        </div>
        <div id="games-filter-row" class="games-filter-row" hidden>
          <label class="games-filter" for="mode-select">
            <span class="games-filter-label">
              Games
              <span id="games-pending-badge" class="pending-badge" hidden>0</span>
            </span>
            <select id="mode-select" aria-label="Filter games">
              <option value="">All games</option>
              <option value="lms">Last Man Standing</option>
              <option value="predictor">Predictor</option>
            </select>
          </label>
        </div>
      </section>
      <section id="content" class="content-stack" aria-live="polite"></section>
      <footer class="muted small">
        Submissions are reviewed by your game's manager before they go live.
      </footer>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
